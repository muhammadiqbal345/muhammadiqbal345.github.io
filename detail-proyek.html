<!doctype html>
<html lang="id">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title id="page-title">Detail Proyek - Muhammad Iqbal Tawakkal</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(17, 24, 39, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary-accent: #3b82f6;
            --primary-gradient: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            --secondary-gradient: linear-gradient(135deg, #10b981 0%, #047857 100%);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Glassmorphic Navbar */
        .navbar {
            background-color: rgba(11, 15, 25, 0.8) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
        }

        .navbar-brand {
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        /* Hero Wrapper */
        .content-wrapper {
            flex: 1;
            background: radial-gradient(circle at 50% 10%, rgba(59, 130, 246, 0.1) 0%, transparent 60%);
            padding-top: 40px;
            padding-bottom: 80px;
        }

        /* Glassmorphic Card */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--border-color);
            border-radius: 1.5rem;
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .btn-outline-custom {
            border: 1px solid var(--primary-accent);
            color: var(--text-main);
            background: transparent;
            transition: all 0.3s ease;
        }

        .btn-outline-custom:hover {
            background: rgba(59, 130, 246, 0.1);
            transform: translateY(-2px);
            color: white;
        }

        .badge-tech {
            background: rgba(59, 130, 246, 0.1);
            color: var(--primary-accent);
            border: 1px solid rgba(59, 130, 246, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 50rem;
            font-weight: 600;
            font-size: 0.85rem;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
            display: inline-block;
        }

        .section-title span {
            background: linear-gradient(to right, #3b82f6, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        footer {
            background-color: #070a12;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark py-3">
        <div class="container">
            <a class="navbar-brand fs-3" href="index.html"><span class="text-primary">Iqbal</span>.dev</a>
            <a href="index.html#portofolio" class="btn btn-outline-custom rounded-pill px-4">
                <i class="bi bi-arrow-left me-2"></i>Kembali
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="content-wrapper d-flex align-items-center">
        <div class="container">
            <div class="glass-card">
                <div class="row g-5 align-items-center">
                    <div class="col-lg-6">
                        <img id="project-img" src="" alt="Detail Proyek" class="img-fluid rounded-4 shadow-lg w-100 object-fit-cover" style="height: 400px;">
                    </div>
                    <div class="col-lg-6">
                        <span class="text-primary text-uppercase tracking-wider fw-bold small mb-2 d-block">Detail Proyek</span>
                        <h1 id="project-title" class="display-5 fw-extrabold text-white mb-3">Memuat Proyek...</h1>
                        <p id="project-desc" class="fs-5 text-secondary mb-4"></p>
                        
                        <h5 class="text-white mb-3">Fitur Utama:</h5>
                        <ul id="project-features" class="text-secondary fs-6 mb-4">
                            <!-- Populated dynamically -->
                        </ul>

                        <h5 class="text-white mb-3">Teknologi yang Digunakan:</h5>
                        <div id="project-tech" class="d-flex flex-wrap mb-4">
                            <!-- Populated dynamically -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center py-5 mt-auto">
        <div class="container">
            <p class="mb-0">&copy; 2026 Muhammad Iqbal Tawakkal. Dilarang menyalin tanpa izin tertulis dari pemilik.</p>
        </div>
    </footer>

    <script>
        // Project dataset
        const projects = {
            "1": {
                title: "Situs E-Commerce Sederhana",
                description: "Situs E-Commerce Sederhana adalah sebuah platform belanja online interaktif yang dirancang khusus untuk mempermudah transaksi digital pengguna. Website ini mengutamakan navigasi yang cepat, tata letak produk yang intuitif, dan responsivitas penuh di berbagai perangkat mobile maupun desktop.",
                image: "./gambar/gambar1.avif",
                features: [
                    "Keranjang belanja interaktif secara real-time.",
                    "Sistem katalog produk dengan penyaringan kategori.",
                    "Halaman detail produk yang kaya visual.",
                    "Formulir konfirmasi pesanan terintegrasi."
                ],
                tech: ["HTML5", "CSS3", "Bootstrap 5", "Vanilla JavaScript"]
            },
            "2": {
                title: "Desain Landing Page Kreatif",
                description: "Landing page berkonversi tinggi dengan desain modern, visual bersih, dan minimalis. Halaman ini dirancang khusus untuk menangkap minat audiens, mempromosikan produk/jasa secara efektif, dan memberikan pengalaman visual yang memikat dengan skema warna yang harmonis.",
                image: "./gambar/gambar2.avif",
                features: [
                    "Desain modern dan minimalis.",
                    "Elemen visual interaktif dengan animasi halus.",
                    "Bagian testimoni pelanggan yang dinamis.",
                    "Call-to-Action (CTA) yang jelas dan persuasif."
                ],
                tech: ["HTML5", "Custom CSS", "CSS Animations", "Bootstrap 5"]
            },
            "3": {
                title: "Aplikasi Web Interaktif",
                description: "Sebuah aplikasi web dinamis dengan performa tinggi yang mengintegrasikan API pihak ketiga untuk menyajikan data secara langsung kepada pengguna. Aplikasi ini menghadirkan fitur-fitur manipulasi data di sisi klien (client-side) dengan interface yang responsif dan respons instan.",
                image: "./gambar/gambar3.avif",
                features: [
                    "Integrasi API eksternal secara asinkron (fetch/async-await).",
                    "Pembaruan data real-time tanpa reload halaman.",
                    "Visualisasi grafik data interaktif.",
                    "Penyimpanan lokal sementara (LocalStorage)."
                ],
                tech: ["HTML5", "Vanilla JavaScript", "Fetch API", "Bootstrap 5", "ChartJS"]
            }
        };

        // Parse query parameter 'id'
        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id') || "1"; // Default to project 1

        const project = projects[projectId];

        if (project) {
            // Update UI contents
            document.getElementById('page-title').textContent = `${project.title} - Detail Proyek`;
            document.getElementById('project-title').textContent = project.title;
            document.getElementById('project-desc').textContent = project.description;
            document.getElementById('project-img').src = project.image;
            document.getElementById('project-img').alt = project.title;

            // Render features list
            const featuresContainer = document.getElementById('project-features');
            featuresContainer.innerHTML = '';
            project.features.forEach(feature => {
                const li = document.createElement('li');
                li.className = 'mb-2';
                li.innerHTML = `<i class="bi bi-check-circle-fill text-primary me-2"></i> ${feature}`;
                featuresContainer.appendChild(li);
            });

            // Render technology badges
            const techContainer = document.getElementById('project-tech');
            techContainer.innerHTML = '';
            project.tech.forEach(t => {
                const span = document.createElement('span');
                span.className = 'badge-tech';
                span.textContent = t;
                techContainer.appendChild(span);
            });
        } else {
            // Project not found error page state
            document.getElementById('project-title').textContent = "Proyek Tidak Ditemukan";
            document.getElementById('project-desc').textContent = "Maaf, detail proyek yang Anda cari tidak tersedia atau telah dihapus.";
            document.getElementById('project-img').src = "./gambar/gambar1.avif";
        }

        // Load saved theme or default to dark
        const currentTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', currentTheme);
    </script>
</body>

</html>
